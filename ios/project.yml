name: StarCall
options:
  bundleIdPrefix: com.shijinglu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  StarCall:
    type: application
    platform: iOS
    sources:
      - path: StarCall
    info:
      path: StarCall/App/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shijinglu.StarCall
        INFOPLIST_FILE: StarCall/App/Info.plist
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
    dependencies: []

  StarCallUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StarCallUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shijinglu.StarCall.UITests
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: StarCall
    dependencies:
      - target: StarCall

schemes:
  StarCall:
    build:
      targets:
        StarCall: all
        StarCallUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - StarCallUITests
